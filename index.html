<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GONU Member Portal</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      color: #222;
      margin: 0;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    button {
      background: #06c755;
      color: #fff;
      border: none;
      font-weight: bold;
    }

    .hidden { display: none; }
    .small { font-size: 14px; color: #666; }
    .error { color: red; }

  </style>
</head>

<body>

  <div id="loading" class="card">
    <h2>กำลังโหลดข้อมูล...</h2>
    <p id="loadingText">เริ่มต้นระบบ</p>
  </div>

  <div id="linkSection" class="card hidden">
    <h2>เชื่อมบัญชีก่อนใช้งาน</h2>
    <input type="text" id="phone" placeholder="เบอร์โทร">
    <input type="date" id="birthDate">
    <button id="linkBtn">เชื่อมบัญชี</button>
    <div id="linkResult" class="small"></div>
  </div>

  <div id="memberSection" class="hidden">
    <div class="card">
      <h2>ข้อมูลสมาชิก</h2>
      <div id="memberInfo"></div>
    </div>

    <div class="card">
      <h2>รายการล่าสุด</h2>
      <div id="latestInfo"></div>
    </div>

    <div class="card">
      <h2>ประวัติการซื้อ</h2>
      <div id="historyInfo"></div>
    </div>
  </div>

<script>

const LIFF_ID = '2009688951-wJWIj6F0';
const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbxqOq3DHuVVaqPp5ppmMs66JtkVVsPGZFHT7-TGCu1VgQnPmJRVLZzDgL9in2nTNu0/exec';

let currentLineUserId = '';

function setLoading(text){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loadingText').textContent = text;
}

function showError(text){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading').innerHTML = `<h2>เกิดข้อผิดพลาด</h2><p class="error">${text}</p>`;
}

async function apiGet(params){
  const url = new URL(API_BASE_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url);
  return await res.json();
}

function formatDate(value){
  if(!value) return '-';
  const d = new Date(value);
  let year = d.getFullYear();
  if(year < 2400) year += 543;
  return `${d.getDate()}/${d.getMonth()+1}/${year}`;
}

async function loadMemberData(){
  setLoading('กำลังโหลดข้อมูลสมาชิก...');
  const result = await apiGet({
    action:'member',
    lineUserId: currentLineUserId
  });

  if(!result.success){
    if((result.message||'').includes('ยังไม่พบ')){
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('linkSection').classList.remove('hidden');
      return;
    }
    showError(result.message);
    return;
  }

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('memberSection').classList.remove('hidden');

  document.getElementById('memberInfo').innerHTML = `
    <p>${result.customer.name}</p>
    <p>${result.customer.phone}</p>
  `;

  document.getElementById('latestInfo').innerHTML = `
    <p>${formatDate(result.latest.date)}</p>
    <p>${result.latest.glasses}</p>
    <p>${result.latest.lens}</p>
  `;

  let html='';
  (result.history||[]).forEach(x=>{
    html+=`<div>${formatDate(x.date)} - ${x.glasses}</div>`;
  });

  document.getElementById('historyInfo').innerHTML = html;
}

async function linkAccount(){
  const phone = document.getElementById('phone').value;
  const birthDate = document.getElementById('birthDate').value;
  const resultBox = document.getElementById('linkResult');

  if(!phone || !birthDate){
    resultBox.textContent = 'กรอกข้อมูลให้ครบ';
    return;
  }

  resultBox.textContent='กำลังเชื่อม...';

  const result = await apiGet({
    action:'link',
    phone,
    birthDate,
    lineUserId: currentLineUserId
  });

  if(result.success){
    document.getElementById('linkSection').classList.add('hidden');
    await loadMemberData();
  }else{
    resultBox.textContent = result.message;
  }
}

async function initApp(){
  try{
    setLoading('กำลังเริ่มต้น...');
    await liff.init({liffId:LIFF_ID});

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    currentLineUserId = profile.userId;

    await loadMemberData();

  }catch(e){
    showError(e.message);
  }
}

document.getElementById('linkBtn').addEventListener('click', linkAccount);
initApp();

</script>

</body>
</html>
